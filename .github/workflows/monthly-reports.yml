name: Monthly Report Generation

on:
  schedule:
    # Run at 6:00 PM IST (12:30 PM UTC) on scheduled days
    # 4th of every month
    - cron: '30 12 4 * *'
    # 11th of every month
    - cron: '30 12 11 * *'
    # 18th of every month
    - cron: '30 12 18 * *'
    # 25th of every month
    - cron: '30 12 25 * *'
    # 2nd of every month
    - cron: '30 12 2 * *'
  
  # Allow manual trigger for testing or recovery
  workflow_dispatch:
    inputs:
      dayOverride:
        description: 'Day to override (4, 11, 18, 25, or 2)'
        required: false
        default: ''
      weekNumber:
        description: 'Week Number to override (1, 2, 3, 4, or 5)'
        required: false
        default: ''

jobs:
  trigger-report:
    runs-on: ubuntu-latest
    
    steps:
      - name: Trigger Monthly Report
        run: |
          echo "Triggering monthly report generation..."
          
          # Prepare data payload
          DAY_OVERRIDE="${{ github.event.inputs.dayOverride }}"
          WEEK_OVERRIDE="${{ github.event.inputs.weekNumber }}"
          
          DATA="{}"
          if [ -n "$DAY_OVERRIDE" ]; then
            DATA=$(echo $DATA | jq -c ". + {dayOverride: ($DAY_OVERRIDE | tonumber)}")
          fi
          if [ -n "$WEEK_OVERRIDE" ]; then
            DATA=$(echo $DATA | jq -c ". + {weekNumber: ($WEEK_OVERRIDE | tonumber)}")
          fi
          
          echo "Payload: $DATA"
          
          # Trigger request with retries and timeout
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -d "$DATA" \
            --connect-timeout 10 \
            --max-time 30 \
            --retry 3 \
            --retry-delay 5 \
            https://leetcode-status-tracker.onrender.com/api/admin/trigger-report)
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          
          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"
          
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✅ Report generation triggered successfully"
          else
            echo "❌ Failed to trigger report generation"
            exit 1
          fi
      
      - name: Report Status
        if: always()
        run: |
          if [ $? -eq 0 ]; then
            echo "📊 Monthly report workflow completed successfully"
          else
            echo "⚠️ Monthly report workflow encountered errors"
          fi
